<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Do it, Lewitt!</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #0f3460;
  --text: #e0e0e0;
  --green: #4caf50;
  --red: #f44336;
  --yellow: #ffc107;
  --meter-bg: #2a2a4a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  max-width: 700px;
  margin: 0 auto;
}
h1 { font-size: 1.4rem; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.card h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 12px; }
.status-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.9rem; }
.status-row .label { color: #aaa; }
.status-row .value { font-weight: 500; }
.ok { color: var(--green); }
.fail { color: var(--red); }
.warn { color: var(--yellow); }
.btn {
  background: var(--accent);
  color: var(--text);
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a4a80; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-row { display: flex; gap: 10px; margin-top: 12px; }
.meters { display: flex; gap: 30px; justify-content: center; padding: 20px 0; }
.meter-group { text-align: center; }
.meter-label { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
.meter-bar-container {
  width: 40px;
  height: 200px;
  background: var(--meter-bg);
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}
.meter-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, var(--green), var(--yellow) 70%, var(--red) 90%);
  border-radius: 6px;
  transition: height 0.05s linear;
  height: 0%;
}
.meter-db { font-size: 0.75rem; color: #888; margin-top: 6px; font-variant-numeric: tabular-nums; }
.log {
  background: #0d0d1a;
  border-radius: 8px;
  padding: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.78rem;
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
  line-height: 1.5;
}
.log-entry { margin-bottom: 2px; }
.hidden { display: none; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab {
  padding: 8px 16px;
  background: transparent;
  border: none;
  color: #888;
  font-size: 0.9rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
</style>
</head>
<body>

<h1>Do it, Lewitt!</h1>
<div class="subtitle" id="subtitle">Loading...</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('status')">Status</button>
  <button class="tab" onclick="showTab('verify')">Verify</button>
  <button class="tab" onclick="showTab('diagnostics')">Diagnostics</button>
</div>

<div id="tab-status">
  <div class="card">
    <h2>Device</h2>
    <div id="device-info"></div>
  </div>
  <div class="card">
    <h2>Configuration</h2>
    <div id="config-info"></div>
    <div class="btn-row">
      <button class="btn" onclick="doSetup()" id="btn-setup">Setup</button>
      <button class="btn" onclick="toggleWirePlumber()" id="btn-wireplumber">Toggle PipeWire</button>
      <button class="btn" onclick="doReset()" id="btn-reset">Reset USB</button>
      <button class="btn" onclick="doTeardown()" id="btn-teardown">Teardown</button>
    </div>
  </div>
</div>

<div id="tab-verify" class="hidden">
  <div class="card">
    <h2>Live Level Meters</h2>
    <div class="meters">
      <div class="meter-group">
        <div class="meter-label">CH 1 (FL)</div>
        <div class="meter-bar-container"><div class="meter-bar" id="meter-0"></div></div>
        <div class="meter-db" id="meter-db-0">-∞ dB</div>
      </div>
      <div class="meter-group">
        <div class="meter-label">CH 2 (FR)</div>
        <div class="meter-bar-container"><div class="meter-bar" id="meter-1"></div></div>
        <div class="meter-db" id="meter-db-1">-∞ dB</div>
      </div>
    </div>
    <div class="btn-row" style="justify-content: center;">
      <button class="btn" onclick="startMeters()" id="btn-start-meters">Start Monitoring</button>
      <button class="btn" onclick="stopMeters()" id="btn-stop-meters" disabled>Stop</button>
    </div>
  </div>
  <div class="card">
    <h2>Record & Playback Test</h2>
    <div class="btn-row" style="align-items: center;">
      <button class="btn" onclick="doVerify()" id="btn-verify">Run Test (2s)</button>
      <button class="btn" onclick="doPlayback()" id="btn-playback" disabled>Play Last Recording</button>
      <label style="display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #aaa; margin-left: 8px;">
        <input type="checkbox" id="mono-toggle" checked> Mono playback
      </label>
    </div>
    <div id="verify-results" style="margin-top: 12px;"></div>
  </div>
</div>

<div id="tab-diagnostics" class="hidden">
  <div class="card">
    <h2>Diagnostic Dump</h2>
    <div class="btn-row" style="margin-top: 0; margin-bottom: 12px;">
      <button class="btn" onclick="doDiagnose()">Run Diagnostics</button>
    </div>
    <div class="log" id="diag-output">Click "Run Diagnostics" to collect system info.</div>
  </div>
</div>

<script>
function showTab(name) {
  ['status','verify','diagnostics'].forEach(t => {
    document.getElementById('tab-' + t).classList.add('hidden');
    document.querySelector('.tab[onclick="showTab(\'' + t + '\')"]').classList.remove('active');
  });
  document.getElementById('tab-' + name).classList.remove('hidden');
  document.querySelector('.tab[onclick="showTab(\'' + name + '\')"]').classList.add('active');
}

async function api(path, opts) {
  const res = await fetch(path, opts || {});
  return res.json();
}

async function refreshStatus() {
  const s = await api('/api/status');
  const sub = document.getElementById('subtitle');
  const devInfo = document.getElementById('device-info');
  const cfgInfo = document.getElementById('config-info');

  if (!s.connected) {
    sub.textContent = 'Device not connected';
    sub.className = 'subtitle fail';
    devInfo.innerHTML = '<div class="status-row"><span class="label">Status</span><span class="value fail">NOT CONNECTED</span></div>';
    cfgInfo.innerHTML = '<div class="status-row"><span class="label">—</span><span>Plug in the device</span></div>';
    return;
  }

  sub.textContent = s.card_id + ' — ' + s.product + ' (serial ' + s.serial + ')';
  sub.className = 'subtitle';

  let html = '';
  html += row('Card', s.card_id + ' (card ' + s.card_index + ')');
  html += row('USB', s.vendor_id + ':' + s.product_id);
  html += row('Capture', s.capture_channels + 'ch ' + s.capture_format + ' ' + s.capture_bits + '-bit @ [' + s.capture_rates + ']');
  html += row('Chan Map', s.capture_channel_map);
  html += row('Playback', s.playback_channels + 'ch ' + s.playback_format + ' ' + s.playback_bits + '-bit @ [' + s.playback_rates + ']');
  devInfo.innerHTML = html;

  let cfg = '';
  cfg += row('ALSA PCM', s.alsa_installed ? 'installed ✓' : 'NOT installed', s.alsa_installed ? 'ok' : 'fail');
  const wpEnabled = s.wp_configured;
  const wpDisabled = s.wp_disabled;
  cfg += row('WirePlumber', wpEnabled ? 'ignore rule enabled ✓' : (wpDisabled ? 'ignore rule disabled' : 'NOT configured'), wpEnabled ? 'ok' : (wpDisabled ? 'ok' : 'fail'));
  document.getElementById('btn-wireplumber').textContent = wpEnabled ? 'Disable Ignore Rule' : 'Enable Ignore Rule';
  cfgInfo.innerHTML = cfg;

  document.getElementById('btn-setup').disabled = s.alsa_installed && s.wp_configured;
  document.getElementById('btn-teardown').disabled = !s.alsa_installed && !s.wp_configured && !s.wp_disabled;
}

async function toggleWirePlumber() {
  const s = await api('/api/status');
  const r = await api('/api/wireplumber', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({enabled: !s.wp_configured})});
  alert(r.ok ? 'WirePlumber setting changed.': 'Change failed:\n' + r.error);
  refreshStatus();
}

function row(label, value, cls) {
  return '<div class="status-row"><span class="label">' + label + '</span><span class="value ' + (cls||'') + '">' + value + '</span></div>';
}

async function doSetup() {
  document.getElementById('btn-setup').textContent = 'Setting up...';
  document.getElementById('btn-setup').disabled = true;
  const r = await api('/api/setup', {method: 'POST'});
  alert(r.ok ? 'Setup complete!\n' + r.message : 'Setup failed:\n' + r.error);
  document.getElementById('btn-setup').textContent = 'Setup';
  refreshStatus();
}

async function doTeardown() {
  if (!confirm('Remove dilctl config and restore WirePlumber management?')) return;
  document.getElementById('btn-teardown').textContent = 'Tearing down...';
  document.getElementById('btn-teardown').disabled = true;
  const r = await api('/api/teardown', {method: 'POST'});
  alert(r.ok ? 'Teardown complete!\n' + r.message : 'Teardown failed:\n' + r.error);
  document.getElementById('btn-teardown').textContent = 'Teardown';
  refreshStatus();
}

async function doReset() {
  if (!confirm('Reset the CONNECT 2 USB device? Recording and playback will be interrupted.')) return;
  document.getElementById('btn-reset').textContent = 'Authenticating...';
  document.getElementById('btn-reset').disabled = true;
  const r = await api('/api/reset', {method: 'POST'});
  alert(r.ok ? r.message : 'USB reset failed:\n' + r.error);
  document.getElementById('btn-reset').textContent = 'Reset USB';
  document.getElementById('btn-reset').disabled = false;
  refreshStatus();
}

let sseSource = null;
async function startMeters() {
  document.getElementById('btn-start-meters').disabled = true;
  document.getElementById('btn-stop-meters').disabled = false;
  sseSource = new EventSource('/api/levels');
  sseSource.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.error) {
      stopMeters();
      document.getElementById('verify-results').innerHTML = '<div class="status-row"><span class="value fail">' + data.error + '</span></div>';
      return;
    }
    updateMeter(0, data.fl);
    updateMeter(1, data.fr);
  };
  sseSource.onerror = () => { stopMeters(); };
}

async function stopMeters() {
  if (sseSource) { sseSource.close(); sseSource = null; }
  document.getElementById('btn-start-meters').disabled = false;
  document.getElementById('btn-stop-meters').disabled = true;
  updateMeter(0, -120);
  updateMeter(1, -120);
}

function updateMeter(ch, db) {
  const pct = Math.max(0, Math.min(100, (db + 60) / 60 * 100));
  document.getElementById('meter-' + ch).style.height = pct + '%';
  const dbText = db <= -120 ? '-∞' : db.toFixed(1);
  document.getElementById('meter-db-' + ch).textContent = dbText + ' dB';
}

async function doVerify() {
  document.getElementById('btn-verify').textContent = 'Recording...';
  document.getElementById('btn-verify').disabled = true;
  document.getElementById('verify-results').innerHTML = '';
  const mono = document.getElementById('mono-toggle').checked;
  const r = await api('/api/verify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({mono: mono})
  });
  let html = '';
  if (r.capture_ok) {
    html += '<div class="status-row"><span class="label">Capture</span><span class="value ok">PASS ✓</span></div>';
    html += '<div class="status-row"><span class="label">CH 1 (FL)</span><span class="value">' + r.capture_rms_db[0].toFixed(1) + ' dB</span></div>';
    html += '<div class="status-row"><span class="label">CH 2 (FR)</span><span class="value">' + (r.capture_rms_db[1] <= -120 ? '-∞' : r.capture_rms_db[1].toFixed(1)) + ' dB</span></div>';
  } else {
    html += '<div class="status-row"><span class="label">Capture</span><span class="value fail">FAIL ✗</span></div>';
    if (r.capture_error) html += '<div class="status-row"><span class="label">Error</span><span>' + r.capture_error + '</span></div>';
  }
  if (r.playback_ok !== undefined) {
    html += '<div class="status-row"><span class="label">Playback</span><span class="value ' + (r.playback_ok ? 'ok' : 'fail') + '">' + (r.playback_ok ? 'PASS ✓' : 'FAIL ✗') + '</span></div>';
  }
  document.getElementById('verify-results').innerHTML = html;
  document.getElementById('btn-verify').textContent = 'Run Test (2s)';
  document.getElementById('btn-verify').disabled = false;
  if (r.capture_ok) {
    document.getElementById('btn-playback').disabled = false;
  }
}

async function doPlayback() {
  document.getElementById('btn-playback').textContent = 'Playing...';
  document.getElementById('btn-playback').disabled = true;
  const r = await api('/api/playback', {method: 'POST'});
  document.getElementById('btn-playback').textContent = 'Play Last Recording';
  document.getElementById('btn-playback').disabled = false;
  if (!r.ok) {
    alert('Playback failed: ' + (r.error || 'unknown error'));
  }
}

async function doDiagnose() {
  document.getElementById('diag-output').textContent = 'Collecting...';
  const r = await api('/api/diagnose', {method: 'POST'});
  document.getElementById('diag-output').textContent = r.output || r.error || 'No output';
}

refreshStatus();
setInterval(refreshStatus, 5000);
</script>
</body>
</html>
